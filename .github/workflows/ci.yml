name: Calidad

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test.unit
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: municipalidad-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: municipalidad-backend/package-lock.json
      - run: npm ci
      - run: npm test

  integracion-docker:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Levantar aplicación completa
        run: docker compose --env-file .env.example up -d --build
      - name: Esperar servicios
        run: |
          for intento in {1..30}; do
            if curl --fail --silent http://localhost:3000/api/health >/dev/null &&
               curl --fail --silent http://localhost:8080 >/dev/null &&
               curl --fail --silent http://localhost:8025 >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose ps
          docker compose logs
          exit 1
      - run: npm run test.e2e:docker
      - name: Mostrar logs en caso de fallo
        if: failure()
        run: docker compose logs
      - name: Detener servicios
        if: always()
        run: docker compose --env-file .env.example down -v
